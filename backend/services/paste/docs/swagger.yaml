basePath: /api/v1
definitions:
  model.CreatePasteRequest:
    properties:
      content:
        type: string
      language:
        type: string
    required:
    - content
    - language
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
      username:
        description: 登录时不需要太严格，只要求必填即可
        type: string
    required:
    - password
    - username
    type: object
  model.LoginResponse:
    properties:
      email:
        type: string
      token:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  model.PasteResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      language:
        type: string
      short_link:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        description: 'Email: 邮箱'
        type: string
      password:
        description: 'Password: 密码'
        minLength: 8
        type: string
      username:
        description: |-
          Username: 用户名
          required: 必填字段
          min=3: 最少3个字符
          max=20: 最多20个字符
          alphanum: 只能包含字母和数字（不能有特殊字符、空格）
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  model.RegisterResponse:
    properties:
      email:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 一个类似于 Pastebin 的代码分享服务
  title: GopherPaste API
  version: "1.0"
paths:
  /pastes:
    post:
      consumes:
      - application/json
      parameters:
      - description: 请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreatePasteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasteResponse'
      summary: 创建代码片段
      tags:
      - pastes
  /pastes/{id}:
    get:
      parameters:
      - description: 短链接ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasteResponse'
      summary: 获取代码片段
      tags:
      - pastes
  /users/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginResponse'
      summary: 用户登录
      tags:
      - User
  /users/register:
    post:
      consumes:
      - application/json
      description: 用户注册接口
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RegisterResponse'
      summary: 用户注册
      tags:
      - User
swagger: "2.0"
