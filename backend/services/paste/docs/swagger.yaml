basePath: /api/v1
definitions:
  model.CreatePasteRequest:
    properties:
      content:
        type: string
      language:
        type: string
      title:
        type: string
      visibility:
        type: string
    required:
    - content
    - language
    - title
    type: object
  model.PasteResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      language:
        type: string
      owner_id:
        type: integer
      short_link:
        type: string
      title:
        type: string
      updated_at:
        type: string
      visibility:
        type: string
    type: object
  model.UpdatePasteRequest:
    properties:
      content:
        type: string
      language:
        type: string
      title:
        type: string
      visibility:
        type: string
    required:
    - content
    - language
    - title
    type: object
host: localhost:8080
info:
  contact: {}
  description: 一个类似于 Pastebin 的代码分享服务
  title: GopherPaste API
  version: "1.0"
paths:
  /me/pastes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.PasteResponse'
            type: array
      summary: 获取我的代码片段列表
      tags:
      - pastes
  /pastes:
    post:
      consumes:
      - application/json
      parameters:
      - description: 请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreatePasteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasteResponse'
      summary: 创建代码片段
      tags:
      - pastes
  /pastes/{id}:
    get:
      parameters:
      - description: 片段ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasteResponse'
      summary: 获取代码片段
      tags:
      - pastes
    put:
      consumes:
      - application/json
      parameters:
      - description: 片段ID
        in: path
        name: id
        required: true
        type: string
      - description: 请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdatePasteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PasteResponse'
      summary: 更新代码片段
      tags:
      - pastes
swagger: "2.0"
