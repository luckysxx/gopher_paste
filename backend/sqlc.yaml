version: "2"
sql:
  # --- 配置 1: Paste 服务 ---
  - schema: "services/paste/db/schema.sql"
    queries: "services/paste/db/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "services/paste/db"
        sql_package: "database/sql"

  # --- 配置 2: User 服务 (预留) ---
  - schema: "services/user/db/schema.sql"
    queries: "services/user/db/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "services/user/db"
        sql_package: "database/sql"