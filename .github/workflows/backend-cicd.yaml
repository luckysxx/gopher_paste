name: Build Backend & Push

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cicd.yaml'

jobs:
  # 并行构建 User Service
  build-user-service:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Build User Service
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/dockerfile.user
        push: true
        
        # 只构建 amd64，速度提升 2-3 倍
        platforms: linux/amd64
        
        # 启用缓存
        cache-from: type=registry,ref=${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/user_service:buildcache
        cache-to: type=registry,ref=${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/user_service:buildcache,mode=max
        
        tags: |
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/user_service:latest
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/user_service:${{ github.sha }}
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/user_service:${{ github.ref_name }}

  # 并行构建 Paste Service
  build-paste-service:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Build Paste Service
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/dockerfile.paste
        push: true
        
        # 只构建 amd64
        platforms: linux/amd64
        
        # 启用缓存
        cache-from: type=registry,ref=${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/paste_service:buildcache
        cache-to: type=registry,ref=${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/paste_service:buildcache,mode=max
        
        tags: |
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/paste_service:latest
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/paste_service:${{ github.sha }}
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/paste_service:${{ github.ref_name }}
