name: Build Frontend & Push

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - 'frontend/**'                           # 只有 frontend 文件夹变动才触发
      - '.github/workflows/frontend-cicd.yaml'  # 或者改了这个配置本身

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # =========== 新增步骤 1 & 2 ===========
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. 登录阿里云 (复用你之前配好的 Secrets，不用动)
    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    # 2. 构建并推送 Frontend Service
    - name: Build Frontend Service
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        
        # 只构建 amd64，速度提升 2-3 倍
        platforms: linux/amd64
        
        # 使用 inline 缓存（兼容阿里云）
        cache-from: type=registry,ref=${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:latest
        cache-to: type=inline
        
        tags: |
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:latest
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:${{ github.sha }}
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:${{ github.ref_name }}