name: Build Frontend & Push

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - 'frontend/**'                           # 只有 frontend 文件夹变动才触发
      - '.github/workflows/frontend-cicd.yaml'  # 或者改了这个配置本身

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # =========== 新增步骤 1 & 2 ===========
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 1. 登录阿里云 (复用你之前配好的 Secrets，不用动)
    - name: Login to Aliyun
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    # 2. 构建并推送 Frontend Service
    - name: Build Frontend Service
      uses: docker/build-push-action@v4
      with:
        # 上下文 Context
        # 这里必须指向 ./frontend，因为你的 Dockerfile 里的 COPY . . 是基于这个目录运行的
        context: ./frontend
        
        # Dockerfile 位置
        file: ./frontend/Dockerfile
        
        push: true
        
        # =========== 新增参数 ===========
        platforms: linux/amd64,linux/arm64
        
        # 镜像标签 (Tags)
        # 确保这里的 frontend_service 和你 docker-compose.yml 里写的一模一样
        tags: |
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:latest
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:${{ github.sha }}
          ${{ secrets.ALIYUN_REGISTRY }}/luckys_devops/frontend_service:${{ github.ref_name }}