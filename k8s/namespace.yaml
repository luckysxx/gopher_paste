# ==========================================
# Namespace - 命名空间
# ==========================================
# 📌 用途：为 GopherPaste 项目创建独立的命名空间
# 📌 好处：资源隔离、权限管理、方便管理和清理

apiVersion: v1                  # API 版本
kind: Namespace                 # 资源类型：命名空间
metadata:
  name: gopher-paste            # 命名空间的名字
                                # 💡 你的所有资源都会部署在这个命名空间下
  
  labels:
    name: gopher-paste          # 标签（方便筛选）
    env: development            # 环境标识（开发环境）
    project: gopher-paste       # 项目标识

# ==========================================
# 💡 命名空间的作用
# ==========================================
# 1. 资源隔离：不同项目的资源互不干扰
#    例如：gopher-paste 命名空间的 redis 不会和 default 命名空间的 redis 冲突
#
# 2. 权限控制：可以为不同命名空间设置不同的 RBAC 权限
#    例如：开发者只能访问 dev 命名空间，不能访问 prod 命名空间
#
# 3. 资源配额：可以为命名空间设置资源限制
#    例如：限制 CPU、内存使用量
#
# 4. 方便管理：一键删除整个项目的所有资源
#    kubectl delete namespace gopher-paste

# ==========================================
# 📚 常用命令
# ==========================================
# 创建命名空间：
#   kubectl apply -f namespace.yaml
#
# 查看所有命名空间：
#   kubectl get namespaces
#   kubectl get ns  (简写)
#
# 查看命名空间详情：
#   kubectl describe namespace gopher-paste
#
# 查看某个命名空间下的所有资源：
#   kubectl get all -n gopher-paste
#
# 设置默认命名空间（可选，方便操作）：
#   kubectl config set-context --current --namespace=gopher-paste
#   # 之后所有 kubectl 命令都默认操作这个命名空间
#
# 删除命名空间（会删除里面的所有资源！）：
#   kubectl delete namespace gopher-paste
