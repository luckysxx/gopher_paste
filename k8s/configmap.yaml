# ==========================================
# ConfigMap - 非敏感配置的集中管理
# ==========================================
# 📌 用途：存储不涉及安全的配置项，比如服务地址、端口、日志级别等
# 📌 特点：明文存储，所有人都能看到
# 📌 好处：配置集中管理，修改配置不需要重新构建镜像

apiVersion: v1                  # API 版本
kind: ConfigMap                 # 资源类型：配置映射
metadata:
  name: gopher-config           # ConfigMap 的名字，其他资源会通过这个名字引用
  namespace: gopher-paste       # 命名空间（独立的项目命名空间）
                                # 💡 资源隔离：所有资源都在这个命名空间下
  labels:
    app: gopher-paste           # 给 ConfigMap 打标签，方便管理和筛选

# ==========================================
# data 区域：存储所有配置项
# ==========================================
# 格式：key: value（纯字符串）
# 使用时：通过 key 读取对应的 value
data:
  # ---------- 服务器配置 ----------
  server_port: "8080"           # Go 程序监听的端口
                                # 💡 虽然是数字，但在 ConfigMap 中必须写成字符串

  # ---------- Redis 配置 ----------
  redis_addr: "gopher-redis:6379"  
                                # Redis 服务的地址
                                # 格式：<K8s Service 名称>:<端口>
                                # 💡 K8s 的 DNS 会自动把 "gopher-redis" 解析成对应 Pod 的 IP
  
  redis_db: "0"                 # Redis 数据库编号（默认是 0）
                                # 💡 Redis 默认有 16 个数据库（0-15）

  # ---------- PostgreSQL 配置 ----------
  db_driver: "postgres"         # 数据库驱动类型
  
  postgres_host: "gopher-postgres"  
                                # PostgreSQL 服务的主机名
                                # 💡 等我们创建 postgres.yaml 后，这个名字会指向 PostgreSQL Pod
  
  postgres_port: "5432"         # PostgreSQL 默认端口
  
  postgres_db: "gopher_paste"   # 数据库名称
                                # 💡 需要和你创建数据库时的名字一致
  
  postgres_sslmode: "disable"   # SSL 模式（开发环境禁用，生产环境建议启用）
                                # 可选值：disable, require, verify-ca, verify-full

  # ---------- 应用配置 ----------
  log_level: "info"             # 日志级别
                                # 可选值：debug, info, warn, error
                                # 💡 开发环境用 debug，生产环境用 info 或 warn
  
  gin_mode: "release"           # Gin 框架模式
                                # debug: 开发模式，输出详细日志
                                # release: 生产模式，性能更好
  
  app_env: "development"        # 应用环境标识
                                # 可选值：development, staging, production
                                # 💡 你可以在代码中根据这个值调整行为

# ==========================================
# 💡 使用示例（在其他 YAML 文件中引用）
# ==========================================
# 方式 1：单个配置项作为环境变量
# env:
# - name: REDIS_ADDR              # 容器内的环境变量名
#   valueFrom:
#     configMapKeyRef:
#       name: gopher-config       # ConfigMap 的名字
#       key: redis_addr           # 要读取的 key

# 方式 2：一次性导入所有配置
# envFrom:
# - configMapRef:
#     name: gopher-config         # 会把所有 key 转换成环境变量
                                  # 比如 redis_addr 变成 REDIS_ADDR（全大写）

# ==========================================
# 📚 管理命令（供参考）
# ==========================================
# 创建/更新：kubectl apply -f configmap.yaml
# 查看：kubectl get configmap gopher-config
# 查看详情：kubectl describe configmap gopher-config
# 删除：kubectl delete configmap gopher-config
# 查看实际内容：kubectl get configmap gopher-config -o yaml
