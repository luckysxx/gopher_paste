# ==========================================
# Deployment - 负责把 Paste Service 跑起来
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paste-service-deploy
  namespace: gopher-paste     # 命名空间（独立的项目命名空间）
  labels:
    app: paste-service        # 给 Deployment 添加标签
spec:
  replicas: 1               # 暂时跑 1 个副本
  selector:
    matchLabels:
      app: paste-service    # 经理要管带 paste-service 标签的 Pod
  template:
    metadata:
      labels:
        app: paste-service  # 给 Pod 贴标签
    spec:
      imagePullSecrets:
      - name: aliyun-secret  # 镜像拉取密钥，名字要和你创建的 Secret 名字一致
      containers:
      - name: paste-service
        # ⚠️ 镜像地址：这是你 CI 构建并推送成功的地址
        # 你的 Mac 是 arm64，CI 构建了双架构，所以 K8s 会自动拉取 arm64 的版本，完美！
        image: crpi-owej7l76wqheszs7.cn-hangzhou.personal.cr.aliyuncs.com/luckys_devops/paste_service:latest
        
        # 镜像拉取策略：
        # Always: 每次重启都去阿里云拉最新的 (开发阶段推荐，保证代码是最新的)
        # IfNotPresent: 本地有就不拉 (省流量)
        imagePullPolicy: Always 
        
        ports:
        - containerPort: 8080 # Go 程序监听的端口
        
        # ==========================================
        # 环境变量配置 - 使用 ConfigMap 和 Secret
        # ==========================================
        # 💡 之前：所有配置都硬编码在这个文件里
        # 💡 现在：从 ConfigMap 和 Secret 中读取
        # 💡 好处：配置集中管理，修改配置不需要重新构建镜像
        env:
        # ---------- 从 ConfigMap 读取配置 ----------
        - name: ENV                     # 运行环境（用于日志配置）
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: env                  # 💡 容器启动后，ENV="production"
        
        - name: REDIS_ADDR              # 环境变量名（Go 代码中会读取这个）
          valueFrom:                    # 值来源于...
            configMapKeyRef:            # ConfigMap 的某个 key
              name: gopher-config       # ConfigMap 的名字（必须和 configmap.yaml 中的一致）
              key: redis_addr           # 读取 ConfigMap 中的 redis_addr 字段
                                        # 💡 容器启动后，REDIS_ADDR="gopher-redis:6379"
        
        - name: REDIS_DB                # Redis 数据库编号
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: redis_db             # 💡 容器启动后，REDIS_DB="0"
        
        - name: SERVER_PORT             # 服务器监听端口
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: server_port          # 💡 容器启动后，SERVER_PORT="8080"
        
        - name: DB_DRIVER               # 数据库驱动
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: db_driver            # 💡 容器启动后，DB_DRIVER="postgres"
        
        # ---------- 从 Secret 读取数据库连接字符串 ----------
        - name: DB_SOURCE               # 数据库完整连接字符串
          valueFrom:
            secretKeyRef:
              name: gopher-secrets
              key: db-source            # 💡 包含用户名、密码等敏感信息
        
        - name: LOG_LEVEL               # 日志级别
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: log_level            # 💡 容器启动后，LOG_LEVEL="info"
        
        - name: GIN_MODE                # Gin 框架模式
          valueFrom:
            configMapKeyRef:
              name: gopher-config
              key: gin_mode             # 💡 容器启动后，GIN_MODE="release"
        
        # ---------- 从 Secret 读取敏感信息 ----------
        - name: REDIS_PASSWORD          # Redis 密码
          valueFrom:
            secretKeyRef:               # 从 Secret 读取
              name: gopher-secrets      # Secret 的名字（必须和 secret.yaml 中的一致）
              key: redis-password       # 读取 Secret 中的 redis-password 字段
                                        # 💡 K8s 会自动把 Base64 解码
                                        # 💡 容器启动后，REDIS_PASSWORD="123456"
        
        - name: JWT_SECRET              # JWT 签名密钥
          valueFrom:
            secretKeyRef:
              name: gopher-secrets
              key: jwt-secret           # 💡 容器启动后，JWT_SECRET="gopherpaste_secret_key_2026"

        # 💡 配置简化说明：
        # ✅ 已使用 DB_SOURCE 统一配置数据库连接
        # ❌ 已移除分散的 POSTGRES_HOST, POSTGRES_PORT, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_SSLMODE
        # 💡 这样配置更简洁，修改更方便

---
# ==========================================
# Service - 负责让别人能找到 Paste Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: paste-service       # 服务的名字
  namespace: gopher-paste   # 命名空间（独立的项目命名空间）
  labels:
    app: paste-service      # 给 Service 添加标签
spec:
  # ⚠️ 类型：LoadBalancer
  # 因为这是 Web 服务，我们(用户)需要在 Mac 浏览器上访问它。
  # OrbStack 看到 LoadBalancer 会自动分配一个 Mac 本地能访问的入口。
  type: LoadBalancer        
  selector:
    app: paste-service      # 把流量转给 paste-service 的 Pod
  ports:
    - protocol: TCP
      port: 8080            # 外部访问端口 (浏览器访问 http://localhost:8080)
      targetPort: 8080      # 容器内部端口 (Go 程序监听的端口)